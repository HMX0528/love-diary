        .about-section {

          will-change: transform, opacity;
        }
        .about__reveal--visible {
          opacity: 1;
          transform: translateY(0);
        }

        /* ── Portrait ── */
        .about__portrait {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 24px;
        }
        .about__portrait-glow {
          width: 100%; max-width: 380px; aspect-ratio: 3/4;
          border-radius: var(--radius-lg);
          position: relative;
          animation: floatGlow 4s ease-in-out infinite;
        }
        @keyframes floatGlow {
          0%, 100% { transform: translateY(0); filter: drop-shadow(0 8px 30px rgba(212,98,138,0.12)); }
          50% { transform: translateY(-8px); filter: drop-shadow(0 16px 40px rgba(212,98,138,0.22)); }
        }
        .about__portrait-glow::before {
          content: "";
          position: absolute;
          inset: -6px;
          border-radius: calc(var(--radius-lg) + 6px);
          background: linear-gradient(135deg, var(--pink-blush), var(--pink-accent), var(--pink-lightest), var(--pink-accent));
          background-size: 300% 300%;
          animation: glowSpin 6s ease-in-out infinite;
          z-index: -1;
          opacity: 0.5;
        }
        @keyframes glowSpin {
          0%, 100% { background-position: 0% 50%; opacity: 0.4; }
          50% { background-position: 100% 50%; opacity: 0.7; }
        }
        .about__portrait-frame {
          width: 100%; height: 100%;
          border-radius: var(--radius-lg);
          overflow: hidden;
          background: linear-gradient(145deg, var(--pink-blush), var(--pink-lightest));
          position: relative;
        }
        .about__portrait-img { width: 100%; height: 100%; object-fit: cover; }
        .about__portrait-placeholder {
          position: absolute; inset: 12px;
          border: 2px dashed var(--pink-soft);
          border-radius: calc(var(--radius-lg) - 8px);
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          gap: 12px; color: var(--pink-warm); font-size: 0.9rem; letter-spacing: 2px;
        }
        .about__portrait-info { text-align: center; }
        .about__name {
          font-size: 1.6rem; color: var(--text-primary); margin-bottom: 6px;
          animation: nameShimmer 3s ease-in-out infinite;
          background: linear-gradient(90deg, var(--text-primary), var(--pink-deep), var(--text-primary));

          background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        @keyframes nameShimmer {

          50% { background-position: 100% center; }
        }
        .about__desc { font-size: 0.9rem; color: var(--text-light); letter-spacing: 1px; }

        /* ── Info cards ── */
        .about__details { display: flex; flex-direction: column; gap: 32px; }
        .about__info-cards {

        /* ── Tags ── */

          animation: tagBounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
          animation-delay: inherit;
          transition: var(--transition-smooth);
        }
        .about__reveal--visible .about__tag {
          opacity: 0;
          animation: tagBounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes tagBounceIn {
          0% { opacity: 0; transform: translateY(16px) scale(0.8); }

          100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .about__tag:hover {

        }

        /* ── Favorites ── */
        .about__favorites-grid {
          display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;

          animation-delay: inherit;

          opacity: 0;
          animation: favSlideIn 0.5s ease forwards;
        }

        }

        @keyframes favSlideIn {
          from { opacity: 0; transform: translateX(-20px); }
          to { opacity: 1; transform: translateX(0); }
        }
        @keyframes favSlideInRight {
          from { opacity: 0; transform: translateX(20px); }
          to { opacity: 1; transform: translateX(0); }
        }
        .about__fav-item:hover {
          border-color: var(--pink-accent);
          transform: translateX(4px) scale(1.02);
          box-shadow: 0 4px 16px rgba(212, 98, 138, 0.1);
        }
        .about__fav-emoji { font-size: 1.4rem; }
        .about__fav-label { display: block; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 2px; }
        .about__fav-value { display: block; font-size: 0.85rem; color: var(--text-primary); font-weight: 500; }

        /* ── Confession ── */
        .about__confession {
          text-align: center;
          padding: 50px 40px;
          background: linear-gradient(135deg, var(--pink-lightest), var(--warm-white));
          border-radius: var(--radius-xl);
          border: 1px solid var(--pink-blush);
          position: relative;
          overflow: hidden;
        }
        .about__confession::before {
          content: "";
          position: absolute;
          inset: 0;
          background: radial-gradient(ellipse at 50% 0%, rgba(232,126,160,0.06) 0%, transparent 70%);
          pointer-events: none;
        }
        .about__confession-heart {
          margin-bottom: 16px;
          animation: confessionHeart 2.5s ease-in-out infinite;
        }
        @keyframes confessionHeart {
          0%, 100% { transform: scale(1); }
          15% { transform: scale(1.2); }
          30% { transform: scale(1); }
          45% { transform: scale(1.15); }
          60% { transform: scale(1); }
        }
        .about__confession-text {
          font-size: 1.15rem; line-height: 2.2; color: var(--text-secondary);
          letter-spacing: 2px; font-family: "Noto Serif SC", serif;
          white-space: pre-line;
          position: relative;
          z-index: 1;
        }
        .about__confession-sign {
          margin-top: 20px; font-size: 0.9rem; color: var(--pink-accent);
          letter-spacing: 2px; position: relative; z-index: 1;
        }

        @media (max-width: 1024px) {
          .about__grid { grid-template-columns: 1fr; gap: 40px; }
          .about__portrait-glow { max-width: 300px; margin: 0 auto; }
        }

          .about__favorites-grid { grid-template-columns: 1fr; }
          .about__confession { padding: 36px 24px; }
          .about__confession-text { font-size: 1rem; }
        }

        .timeline-section {
          padding: 120px 0;
          background: linear-gradient(180deg, var(--cream) 0%, var(--pink-lightest) 100%);
          overflow: hidden;
        }
        .timeline { position: relative; max-width: 1000px; margin: 0 auto; padding: 20px 0; }

        /* === Reveal animation === */
        .timeline__reveal {
          opacity: 0;
          transform: translateY(40px) scale(0.95);
          filter: blur(6px);
          transition:
            opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
            transform 0.9s cubic-bezier(0.22, 1, 0.36, 1),
            filter 0.9s cubic-bezier(0.22, 1, 0.36, 1);
          will-change: transform, opacity, filter;
        }
        .timeline__reveal--visible {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
        .timeline__reveal:nth-child(even) .timeline__card--left .timeline__card-body,
        .timeline__reveal:nth-child(even) .timeline__card--right .timeline__card-body {
          transition-delay: inherit;
        }

        /* === Line animation === */
        .timeline__line {
          position: absolute; left: 50%; top: 0; bottom: 0;
          width: 2px;
          background: linear-gradient(180deg, var(--pink-soft), var(--pink-accent), var(--pink-soft));
          transform: translateX(-50%);
          animation: lineGrow 2s ease-out forwards;
          transform-origin: top center;
        }
        @keyframes lineGrow {
          from { transform: translateX(-50%) scaleY(0); }
          to { transform: translateX(-50%) scaleY(1); }
        }

        .timeline__card { position: relative; width: 50%; padding: 20px 0; }
        .timeline__card--left { padding-right: 50px; left: 0; }
        .timeline__card--right { padding-left: 50px; left: 50%; }
        .timeline__card-dot {
          position: absolute; top: 32px; width: 20px; height: 20px;
          background: var(--pink-accent); border: 4px solid var(--cream);
          border-radius: 50%; box-shadow: 0 0 0 4px var(--pink-soft),
            0 0 20px rgba(212, 98, 138, 0.25);
          z-index: 2;
          transition: box-shadow 0.5s ease;
        }
        .timeline__card-body:hover + .timeline__card-dot,
        .timeline__card:hover .timeline__card-dot {
          box-shadow: 0 0 0 4px var(--pink-accent), 0 0 30px rgba(212, 98, 138, 0.4);
        }
        .timeline__card--left .timeline__card-dot { right: -10px; }
        .timeline__card--right .timeline__card-dot { left: -10px; }

        .timeline__card-year {
          position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
          font-size: 0.7rem; color: var(--pink-deep); white-space: nowrap; font-weight: 500;
        }
        .timeline__card-body {
          background: var(--warm-white); border-radius: var(--radius-md);
          padding: 28px; box-shadow: var(--shadow-card);
          border: 1px solid var(--pink-mist);
          transition:
            transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
            box-shadow 0.5s ease,
            border-color 0.3s ease;
          position: relative;
          overflow: hidden;
        }
        /* Dreamy glow on hover */
        .timeline__card-body::before {
          content: "";

            circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
            rgba(232, 126, 160, 0.04) 0%,
            transparent 60%
          );
          opacity: 0;
          transition: opacity 0.6s ease;
          pointer-events: none;
        }
        .timeline__card-body:hover::before { opacity: 1; }
        .timeline__card-body:hover {
          transform: translateY(-6px) scale(1.01);
          box-shadow: 0 12px 40px rgba(212, 98, 138, 0.18);
          border-color: var(--pink-soft);
        }
        .timeline__card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }

        .timeline__card-type { font-size: 0.7rem; padding: 3px 12px; border-radius: 50px; letter-spacing: 1px; }
        .timeline__card-type--meet { background: #fce4ec; color: #c44a7a; }
        .timeline__card-type--date { background: #f3e5f5; color: #7b1fa2; }
        .timeline__card-type--confess { background: #fce4ec; color: #d4628a; }
        .timeline__card-type--love { background: #fbe9e7; color: #bf360c; }
        .timeline__card-type--anniversary { background: #e8f5e9; color: #2e7d32; }
        .timeline__card-type--travel { background: #e3f2fd; color: #1565c0; }
        .timeline__card-title { font-size: 1.3rem; color: var(--text-primary); margin-bottom: 4px; }
        .timeline__card-subtitle { font-size: 0.85rem; color: var(--pink-accent); margin-bottom: 12px; letter-spacing: 1px; }
        .timeline__card-desc { font-size: 0.9rem; line-height: 1.8; color: var(--text-secondary); }
        .timeline__card-photo { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--pink-mist); }

          padding: 20px; border: 2px dashed var(--pink-blush);
          border-radius: var(--radius-sm); color: var(--pink-warm);

          .timeline__card--left { padding-right: 0; padding-left: 50px; }

          .timeline__card--left .timeline__card-dot,
